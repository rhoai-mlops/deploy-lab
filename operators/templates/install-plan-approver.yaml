apiVersion: v1
kind: ServiceAccount
metadata:
  name: installplan-approver
  namespace: openshift-operators
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: installplan-approver
  namespace: openshift-operators
rules:
  - apiGroups: ["operators.coreos.com"]
    resources: ["installplans"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["subscriptions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: installplan-approver
  namespace: openshift-operators
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: installplan-approver
subjects:
  - kind: ServiceAccount
    name: installplan-approver
    namespace: openshift-operators
---
apiVersion: batch/v1
kind: Job
metadata:
  name: installplan-approver
  namespace: openshift-operators
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: installplan-approver
      restartPolicy: OnFailure
      containers:
        - name: approver
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              NAMESPACE="openshift-operators"
              MAX_LOOPS=60
              SLEEP_SECONDS=10

              echo "Approving ONLY initial InstallPlans for Manual Subscriptions (no upgrades). Namespace=${NAMESPACE}"

              for loop in $(seq 1 ${MAX_LOOPS}); do
                # Print: name, approval, installedCSV, installplan.name
                # Then keep only: approval=Manual AND installedCSV empty/<no value>
                PENDING_SUBS=$(
                  oc get subscriptions -n "${NAMESPACE}" -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.installPlanApproval}{"\t"}{.status.installedCSV}{"\t"}{.status.installplan.name}{"\n"}{end}' \
                  | awk -F'\t' '$2=="Manual" && ($3=="" || $3=="<no value>") {print $1"\t"$4}'
                )

                if [[ -z "${PENDING_SUBS}" ]]; then
                  echo "No pending initial installs found. Done."
                  exit 0
                fi

                echo "Loop ${loop}/${MAX_LOOPS} - Pending initial installs:"
                echo "${PENDING_SUBS}" | sed 's/^/  - /'

                while IFS=$'\t' read -r sub ip; do
                  [[ -z "${sub}" ]] && continue

                  if [[ -z "${ip}" || "${ip}" == "<no value>" ]]; then
                    echo "Subscription ${sub}: InstallPlan not created yet. Waiting..."
                    continue
                  fi

                  approved="$(oc get installplan "${ip}" -n "${NAMESPACE}" -o jsonpath='{.spec.approved}' 2>/dev/null || echo "false")"
                  if [[ "${approved}" == "true" ]]; then
                    echo "Subscription ${sub}: InstallPlan ${ip} already approved."
                    continue
                  fi

                  echo "Subscription ${sub}: approving InstallPlan ${ip}"
                  oc patch installplan "${ip}" -n "${NAMESPACE}" --type merge --patch '{"spec":{"approved":true}}' >/dev/null
                done <<< "${PENDING_SUBS}"

                sleep "${SLEEP_SECONDS}"
              done

              echo "ERROR: Timed out after $((MAX_LOOPS*SLEEP_SECONDS)) seconds; some initial installs still not completed."
              oc get subscriptions -n "${NAMESPACE}" -o wide || true
              oc get installplans -n "${NAMESPACE}" -o wide || true
              exit 1